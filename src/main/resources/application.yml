server:
  port: 8080

spring:
  application:
    name: fcfs-coupon-request-service

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3
    template:
      default-topic: coupon-issue-topic

# [서킷 브레이커] Resilience4j 설정
resilience4j:
  circuitbreaker:
    instances:
      # Redis 연결용 서킷 브레이커
      redis:
        sliding-window-size: 10          # 최근 10번의 요청을 기준으로 판단
        failure-rate-threshold: 50       # 실패율 50% 초과 시 서킷 OPEN (차단)
        wait-duration-in-open-state: 10s # 서킷 OPEN 후 10초 뒤 HALF-OPEN 시도
        permitted-number-of-calls-in-half-open-state: 3  # HALF-OPEN 시 3번만 허용
      # Kafka 연결용 서킷 브레이커
      kafka:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

# [분산 트레이싱] Micrometer + Zipkin 설정
management:
  tracing:
    sampling:
      probability: 1.0  # 100% 요청 트레이싱 (운영에서는 0.1 = 10%로 낮춤)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans  # Zipkin 서버 주소
